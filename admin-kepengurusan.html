<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Kelola Kepengurusan RNHKBP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #3b82f6;
      --primary-light: #93c5fd;
      --primary-soft: #dbeafe;
      --primary-dark: #1e40af;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #1e293b;
      --gray: #64748b;
      --gray-light: #e2e8f0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f1f5f9;
      color: var(--dark);
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 260px;
      background: white;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      padding: 2rem 1rem;
      overflow-y: auto;
      z-index: 1000;
    }

    .sidebar h4 {
      color: var(--primary-dark);
      font-weight: 600;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--primary-soft);
    }

    .sidebar h4 i {
      margin-right: 10px;
      color: var(--primary);
    }

    .sidebar-menu {
      list-style: none;
      padding: 0;
    }

    .sidebar-menu li {
      margin-bottom: 0.5rem;
    }

    .sidebar-menu a {
      display: flex;
      align-items: center;
      padding: 0.8rem 1rem;
      color: var(--gray);
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .sidebar-menu a i {
      width: 25px;
      margin-right: 10px;
      font-size: 1.1rem;
    }

    .sidebar-menu a:hover {
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .sidebar-menu a.active {
      background: var(--primary);
      color: white;
    }

    .sidebar-menu a.active i {
      color: white;
    }

    /* Main Content */
    .main-content {
      margin-left: 260px;
      padding: 2rem;
    }

    /* Navbar */
    .navbar-admin {
      background: white;
      border-radius: 15px;
      padding: 1rem 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .navbar-admin h5 {
      margin: 0;
      font-weight: 600;
      color: var(--dark);
    }

    .navbar-admin h5 i {
      color: var(--primary);
      margin-right: 10px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-info span {
      color: var(--gray);
      font-size: 0.9rem;
    }

    .btn-logout {
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.4rem 1.2rem;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .btn-logout:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
    }

    /* Cards */
    .section-card {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 5px 20px rgba(0,0,0,0.05);
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: var(--dark);
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--primary-soft);
    }

    .section-title i {
      color: var(--primary);
      margin-right: 10px;
    }

    /* Form */
    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--gray);
      margin-bottom: 0.3rem;
    }

    .form-control {
      border: 1px solid var(--gray-light);
      border-radius: 10px;
      padding: 0.6rem 1rem;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn-primary {
      background: var(--primary);
      border: none;
      border-radius: 10px;
      padding: 0.6rem 1.5rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-outline-primary {
      border: 2px solid var(--primary);
      color: var(--primary);
      background: transparent;
      border-radius: 10px;
      padding: 0.6rem 1.5rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-outline-primary:hover {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: var(--danger);
      border: none;
      border-radius: 10px;
      padding: 0.6rem 1.5rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(220, 38, 38, 0.3);
    }

    /* Grid untuk form */
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    /* Tabel preview */
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    .preview-table th {
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.8rem;
      text-align: left;
    }

    .preview-table td {
      padding: 0.8rem;
      border-bottom: 1px solid var(--gray-light);
      font-size: 0.9rem;
    }

    .preview-table tr:hover {
      background: var(--primary-soft);
    }

    .action-btns button {
      margin: 0 3px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
    }

    /* Alert */
    .alert {
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
      border: none;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
    }

    .alert-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    /* Loading */
    .spinner-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      display: none;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--primary-soft);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        width: 100%;
        height: auto;
        position: relative;
      }
      .main-content {
        margin-left: 0;
      }
    }
  </style>
</head>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
// ================= KONFIGURASI FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyCwQGsFPBIs_gk0Xc1hscpG-7n6M16gqWc",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan",
  storageBucket: "rnhkbp-pelikan.firebasestorage.app",
  messagingSenderId: "202813062166",
  appId: "1:202813062166:web:eb3d963d5965a5e6f48937"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ================= CEK LOGIN =================
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById('adminEmail').innerHTML = `<i class="fas fa-user-circle me-1"></i>${user.email}`;
    loadData();
  }
});

// ================= LOGOUT =================
function logout() {
  auth.signOut()
    .then(() => {
      window.location.href = "login.html";
    })
    .catch(error => {
      showAlert('Gagal logout: ' + error.message, 'danger');
    });
}

// ================= SHOW ALERT =================
function showAlert(message, type = 'success') {
  const alertEl = document.getElementById('alertMessage');
  alertEl.className = `alert alert-${type}`;
  alertEl.style.display = 'block';
  alertEl.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i>${message}`;
  
  setTimeout(() => {
    alertEl.style.display = 'none';
  }, 3000);
}

// ================= SHOW LOADING =================
function showLoading(show) {
  document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
}

// ================= LOAD DATA DARI FIRESTORE =================
async function loadData() {
  showLoading(true);
  
  try {
    const docRef = db.collection("pengurus").doc("kepengurusan");
    const docSnap = await docRef.get();
    
    if (docSnap.exists) {
      const data = docSnap.data();
      
      // Inti Pengurus
      document.getElementById('ketua').value = data.ketua || 'Ricky Sihombing';
      document.getElementById('ketua_kontak').value = data.ketua_kontak || '0812-3456-7890';
      document.getElementById('sekretaris').value = data.sekretaris || 'Gabriel Marbun';
      document.getElementById('sekretaris_kontak').value = data.sekretaris_kontak || '0812-3456-7891';
      document.getElementById('bendahara').value = data.bendahara || 'Vincen Manurung';
      document.getElementById('bendahara_kontak').value = data.bendahara_kontak || '0812-3456-7892';
      
      // 7 Seksi
      document.getElementById('seksi1').value = data.seksi1 || 'Liven Manalu';
      document.getElementById('seksi1_kontak').value = data.seksi1_kontak || '0812-3456-7893';
      document.getElementById('seksi2').value = data.seksi2 || 'Dirga Simarmata';
      document.getElementById('seksi2_kontak').value = data.seksi2_kontak || '0812-3456-7894';
      document.getElementById('seksi3').value = data.seksi3 || 'Bella Tampubolon';
      document.getElementById('seksi3_kontak').value = data.seksi3_kontak || '0812-3456-7895';
      document.getElementById('seksi4').value = data.seksi4 || 'Frans Hutagalung';
      document.getElementById('seksi4_kontak').value = data.seksi4_kontak || '0812-3456-7896';
      document.getElementById('seksi5').value = data.seksi5 || 'Herland Pardede';
      document.getElementById('seksi5_kontak').value = data.seksi5_kontak || '0812-3456-7897';
      document.getElementById('seksi6').value = data.seksi6 || 'Putri Manalu';
      document.getElementById('seksi6_kontak').value = data.seksi6_kontak || '0812-3456-7898';
      document.getElementById('seksi7').value = data.seksi7 || 'Samuel Sitanggang';
      document.getElementById('seksi7_kontak').value = data.seksi7_kontak || '0812-3456-7899';
      
      // Parguru & Inang
      document.getElementById('parguru').value = data.parguru || 'Gabriel Manullang';
      document.getElementById('parguru_kontak').value = data.parguru_kontak || '0812-3456-7800';
      document.getElementById('inang').value = data.inang || 'Ibu Sorta Simanjuntak';
      document.getElementById('inang_kontak').value = data.inang_kontak || '0812-3456-7810';
    } else {
      // Data default jika belum ada
      console.log("Data belum ada, menggunakan default");
    }
    
    updatePreview();
    showAlert('Data berhasil dimuat', 'success');
    
  } catch (error) {
    console.error("Error loading data:", error);
    showAlert('Gagal memuat data: ' + error.message, 'danger');
  }
  
  showLoading(false);
}

// ================= SIMPAN DATA KE FIRESTORE =================
async function simpanData() {
  showLoading(true);
  
  try {
    const data = {
      // Inti Pengurus
      ketua: document.getElementById('ketua').value,
      ketua_kontak: document.getElementById('ketua_kontak').value,
      sekretaris: document.getElementById('sekretaris').value,
      sekretaris_kontak: document.getElementById('sekretaris_kontak').value,
      bendahara: document.getElementById('bendahara').value,
      bendahara_kontak: document.getElementById('bendahara_kontak').value,
      
      // 7 Seksi
      seksi1: document.getElementById('seksi1').value,
      seksi1_kontak: document.getElementById('seksi1_kontak').value,
      seksi2: document.getElementById('seksi2').value,
      seksi2_kontak: document.getElementById('seksi2_kontak').value,
      seksi3: document.getElementById('seksi3').value,
      seksi3_kontak: document.getElementById('seksi3_kontak').value,
      seksi4: document.getElementById('seksi4').value,
      seksi4_kontak: document.getElementById('seksi4_kontak').value,
      seksi5: document.getElementById('seksi5').value,
      seksi5_kontak: document.getElementById('seksi5_kontak').value,
      seksi6: document.getElementById('seksi6').value,
      seksi6_kontak: document.getElementById('seksi6_kontak').value,
      seksi7: document.getElementById('seksi7').value,
      seksi7_kontak: document.getElementById('seksi7_kontak').value,
      
      // Parguru & Inang
      parguru: document.getElementById('parguru').value,
      parguru_kontak: document.getElementById('parguru_kontak').value,
      inang: document.getElementById('inang').value,
      inang_kontak: document.getElementById('inang_kontak').value,
      
      lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    await db.collection("pengurus").doc("kepengurusan").set(data);
    
    updatePreview();
    showAlert('Data kepengurusan berhasil disimpan!', 'success');
    
  } catch (error) {
    console.error("Error saving data:", error);
    showAlert('Gagal menyimpan: ' + error.message, 'danger');
  }
  
  showLoading(false);
}
