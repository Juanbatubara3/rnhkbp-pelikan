<!DOCTYPE html>
<html>
<head>
  <title>Upload Artikel Profesional</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Quill CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
  <h3>Upload Artikel</h3>

  <input type="text" id="judul" class="form-control mb-3" placeholder="Judul Artikel">

  <!-- Editor -->
  <div id="editor" style="height:200px;" class="mb-3"></div>

  <input type="file" id="file" class="form-control mb-3" accept="image/*">

  <button onclick="uploadArtikel()" class="btn btn-primary">Upload Artikel</button>

  <hr>

  <div id="daftarArtikel"></div>
</div>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
const cloudName = "dnyrxwl1g";
const uploadPreset = "rnhkbp-pelikan";

// Inisialisasi Editor
var quill = new Quill('#editor', {
  theme: 'snow',
  placeholder: 'Tulis isi artikel di sini...',
  modules: {
    toolbar: [
      [{ 'header': [1, 2, 3, false] }],
      ['bold', 'italic', 'underline'],
      [{ 'list': 'ordered'}, { 'list': 'bullet' }],
      ['link'],
      ['clean']
    ]
  }
});

function uploadArtikel() {
  const judul = document.getElementById("judul").value;
  const isi = quill.root.innerHTML;
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!judul || !isi || !file) {
    alert("Lengkapi semua data!");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    tampilkanArtikel(judul, isi, data.secure_url);

    document.getElementById("judul").value = "";
    quill.root.innerHTML = "";
    fileInput.value = "";
  })
  .catch(err => {
    alert("Upload gagal!");
    console.error(err);
  });
}

function tampilkanArtikel(judul, isi, gambarUrl) {
  const container = document.getElementById("daftarArtikel");

  container.innerHTML += `
    <div class="card mb-4 shadow">
      <img src="${gambarUrl}" class="card-img-top">
      <div class="card-body">
        <h4 class="card-title">${judul}</h4>
        <div class="card-text">${isi}</div>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
