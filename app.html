<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem RNHKBP</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage">
  <div class="card p-4 shadow">
    <h3 class="text-center mb-3">Login Admin</h3>
    <input type="email" id="email" class="form-control mb-2" placeholder="Email">
    <input type="password" id="password" class="form-control mb-3" placeholder="Password">
    <button class="btn btn-dark w-100" onclick="login()">Login</button>
  </div>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboardPage" style="display:none;">
  <div class="card p-4 shadow">
    <div class="d-flex justify-content-between">
      <h3>Dashboard</h3>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
    <hr>
    <button class="btn btn-primary w-100 mb-2" onclick="showPage('absensiPage')">Kelola Absensi</button>
    <button class="btn btn-success w-100 mb-2" onclick="showPage('blogPage')">Kelola Blog</button>
  </div>
</div>

<!-- ================= ABSENSI ================= -->
<div id="absensiPage" style="display:none;">
  <div class="card p-4 shadow">
    <button class="btn btn-secondary mb-3" onclick="showPage('dashboardPage')">← Kembali</button>
    <h4>Data Absensi</h4>

    <input type="text" id="nama" class="form-control mb-2" placeholder="Nama">
    <input type="date" id="tanggal" class="form-control mb-2">
    <input type="text" id="kegiatan" class="form-control mb-2" placeholder="Kegiatan">
    <button class="btn btn-primary w-100 mb-3" onclick="tambahAbsensi()">Simpan</button>

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Tanggal</th>
          <th>Kegiatan</th>
        </tr>
      </thead>
      <tbody id="dataAbsensi"></tbody>
    </table>
  </div>
</div>

<!-- ================= BLOG ================= -->
<div id="blogPage" style="display:none;">
  <div class="card p-4 shadow">
    <button class="btn btn-secondary mb-3" onclick="showPage('dashboardPage')">← Kembali</button>
    <h4>Kelola Blog</h4>

    <input type="text" id="judul" class="form-control mb-2" placeholder="Judul">
    <textarea id="isi" class="form-control mb-2" placeholder="Isi Blog"></textarea>
    <button class="btn btn-success w-100 mb-3" onclick="tambahBlog()">Simpan</button>

    <ul class="list-group" id="listBlog"></ul>
  </div>
</div>

</div>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_CONFIG_KAMU",
  authDomain: "ISI_CONFIG_KAMU",
  projectId: "ISI_CONFIG_KAMU",
  storageBucket: "ISI_CONFIG_KAMU",
  messagingSenderId: "ISI_CONFIG_KAMU",
  appId: "ISI_CONFIG_KAMU"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= NAVIGATION =================
window.showPage = function(page){
  loginPage.style.display="none";
  dashboardPage.style.display="none";
  absensiPage.style.display="none";
  blogPage.style.display="none";
  document.getElementById(page).style.display="block";
}

// ================= AUTH =================
window.login = function(){
  signInWithEmailAndPassword(auth,email.value,password.value)
    .catch(e=>alert(e.message));
}

window.logout = function(){
  signOut(auth);
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    showPage("dashboardPage");
    loadAbsensi();
    loadBlog();
  }else{
    showPage("loginPage");
  }
});

// ================= ABSENSI =================
window.tambahAbsensi = async function(){
  if(!nama.value || !tanggal.value || !kegiatan.value){
    alert("Isi semua field!");
    return;
  }
  await addDoc(collection(db,"absensi"),{
    nama:nama.value,
    tanggal:tanggal.value,
    kegiatan:kegiatan.value
  });
  nama.value="";
  tanggal.value="";
  kegiatan.value="";
  loadAbsensi();
}

async function loadAbsensi(){
  const snapshot = await getDocs(collection(db,"absensi"));
  dataAbsensi.innerHTML="";
  snapshot.forEach(doc=>{
    const d=doc.data();
    dataAbsensi.innerHTML+=`
      <tr>
        <td>${d.nama}</td>
        <td>${d.tanggal}</td>
        <td>${d.kegiatan}</td>
      </tr>
    `;
  });
}

// ================= BLOG =================
window.tambahBlog = async function(){
  if(!judul.value || !isi.value){
    alert("Isi semua field!");
    return;
  }
  await addDoc(collection(db,"blog"),{
    judul:judul.value,
    isi:isi.value
  });
  judul.value="";
  isi.value="";
  loadBlog();
}

async function loadBlog(){
  const snapshot = await getDocs(collection(db,"blog"));
  listBlog.innerHTML="";
  snapshot.forEach(doc=>{
    const d=doc.data();
    listBlog.innerHTML+=`
      <li class="list-group-item">
        <strong>${d.judul}</strong><br>${d.isi}
      </li>
    `;
  });
}

</script>

</body>
