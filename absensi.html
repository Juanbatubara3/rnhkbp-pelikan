<!DOCTYPE html>
<html>
<head>
  <title>Absensi Kegiatan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tambahkan Font Awesome untuk icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Absensi Partangiangan & Latihan Koor</span>
    <a href="dashboard.html" class="btn btn-light">Kembali</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- FORM INPUT -->
  <div class="card p-3 mb-4 shadow">
    <h5>Input Absensi Kegiatan</h5>

    <select id="kegiatan" class="form-control mb-2">
      <option value="Partangiangan">Partangiangan</option>
      <option value="Latihan Koor">Latihan Koor</option>
      <option value="Lainnya">Lainnya</option>
    </select>

    <select id="anggotaSelect" class="form-control mb-2"></select>

    <input type="date" id="tanggal" class="form-control mb-2" onchange="isiHari()">
    <input type="text" id="hari" class="form-control mb-2" placeholder="Hari" readonly>

    <select id="status" class="form-control mb-2">
      <option value="Hadir">Hadir</option>
      <option value="Izin">Izin</option>
      <option value="Sakit">Sakit</option>
      <option value="Alpha">Alpha</option>
    </select>

    <button onclick="simpanAbsensi()" class="btn btn-primary">Simpan</button>
  </div>

  <!-- TABEL -->
  <div class="card p-3 shadow">
    <h5>Riwayat Absensi</h5>
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Kegiatan</th>
          <th>Nama</th>
          <th>Kategori</th>
          <th>Hari</th>
          <th>Tanggal</th>
          <th>Status</th>
          <th>Aksi</th> <!-- Kolom baru untuk aksi -->
        </tr>
      </thead>
      <tbody id="dataAbsensi"></tbody>
    </table>
  </div>

  <!-- REKAP TOTAL -->
  <div class="card p-3 mt-4 shadow">
    <h5>Rekap Total Absensi</h5>

    <h6 class="mt-3">Naposobulung</h6>
    <div class="row">
      <div class="col-md-3">Hadir: <span id="naposoHadir">0</span></div>
      <div class="col-md-3">Izin: <span id="naposoIzin">0</span></div>
      <div class="col-md-3">Sakit: <span id="naposoSakit">0</span></div>
      <div class="col-md-3">Alpha: <span id="naposoAlpha">0</span></div>
    </div>

    <h6 class="mt-3">Parguru Malua</h6>
    <div class="row">
      <div class="col-md-3">Hadir: <span id="parguruHadir">0</span></div>
      <div class="col-md-3">Izin: <span id="parguruIzin">0</span></div>
      <div class="col-md-3">Sakit: <span id="parguruSakit">0</span></div>
      <div class="col-md-3">Alpha: <span id="parguruAlpha">0</span></div>
    </div>

    <hr>

    <h6>Filter Download</h6>
    <div class="row">
      <div class="col-md-4">
        <input type="date" id="filterTanggal" class="form-control mb-2" placeholder="Filter Tanggal">
      </div>
      <div class="col-md-4">
        <select id="filterKegiatan" class="form-control mb-2">
          <option value="">Semua Kegiatan</option>
          <option value="Partangiangan">Partangiangan</option>
          <option value="Latihan Koor">Latihan Koor</option>
          <option value="Lainnya">Lainnya</option>
        </select>
      </div>
      <div class="col-md-4">
        <button onclick="downloadTXT()" class="btn btn-success w-100">
          Download TXT
        </button>
      </div>
    </div>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCwQGsFPBIs_gk0Xc1hscpG-7n6M16gqWc",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan",
  storageBucket: "rnhkbp-pelikan.firebasestorage.app",
  messagingSenderId: "202813062166",
  appId: "1:202813062166:web:eb3d963d5965a5e6f48937"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
  }
});

// LOAD ANGGOTA
db.collection("anggota").onSnapshot(snapshot=>{
  let options="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    options += `<option value="${doc.id}|${data.nama}|${data.kategori}">
      ${data.nama} (${data.kategori})
    </option>`;
  });
  document.getElementById("anggotaSelect").innerHTML = options;
});

// ISI HARI
function isiHari(){
  const tanggal = document.getElementById("tanggal").value;
  if(!tanggal) return;

  const hariList = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const date = new Date(tanggal + "T00:00:00");
  document.getElementById("hari").value = hariList[date.getDay()];
}

// SIMPAN
function simpanAbsensi(){
  const kegiatan = document.getElementById("kegiatan").value;
  const anggotaData = document.getElementById("anggotaSelect").value.split("|");
  const tanggal = document.getElementById("tanggal").value;
  const hari = document.getElementById("hari").value;
  const status = document.getElementById("status").value;

  if(!tanggal){
    alert("Pilih tanggal dulu!");
    return;
  }

  db.collection("absensi").add({
    kegiatan,
    anggotaId: anggotaData[0],
    nama: anggotaData[1],
    kategori: anggotaData[2],
    tanggal,
    hari,
    status,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>{
    alert("Absensi berhasil disimpan");
    document.getElementById("tanggal").value="";
    document.getElementById("hari").value="";
  });
}

// FUNGSI HAPUS ABSENSI
function hapusAbsensi(id){
  if(confirm("Apakah Anda yakin ingin menghapus data absensi ini?")){
    db.collection("absensi").doc(id).delete()
      .then(() => {
        alert("Data absensi berhasil dihapus");
      })
      .catch((error) => {
        alert("Gagal menghapus data: " + error.message);
      });
  }
}

// TAMPILKAN + HITUNG
db.collection("absensi")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{
  let html="";
  let naposoHadir=0, naposoIzin=0, naposoSakit=0, naposoAlpha=0;
  let parguruHadir=0, parguruIzin=0, parguruSakit=0, parguruAlpha=0;

  snapshot.forEach(doc=>{
    const data = doc.data();
    const docId = doc.id; // Ambil ID dokumen
    
    // Perbaiki pengecekan kategori sesuai dengan data di Firestore
    const kategori = data.kategori || "";
    
    if(kategori === "Naposobulung"){
      if(data.status==="Hadir") naposoHadir++;
      if(data.status==="Izin") naposoIzin++;
      if(data.status==="Sakit") naposoSakit++;
      if(data.status==="Alpha") naposoAlpha++;
    } else if(kategori === "Parguru Malua"){
      if(data.status==="Hadir") parguruHadir++;
      if(data.status==="Izin") parguruIzin++;
      if(data.status==="Sakit") parguruSakit++;
      if(data.status==="Alpha") parguruAlpha++;
    }

    html += `
      <tr>
        <td>${data.kegiatan || ''}</td>
        <td>${data.nama || ''}</td>
        <td>${data.kategori || ''}</td>
        <td>${data.hari || ''}</td>
        <td>${data.tanggal || ''}</td>
        <td>${data.status || ''}</td>
        <td>
          <button onclick="hapusAbsensi('${docId}')" class="btn btn-danger btn-sm">
            <i class="fas fa-trash"></i> Hapus
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("dataAbsensi").innerHTML = html;

  document.getElementById("naposoHadir").innerText = naposoHadir;
  document.getElementById("naposoIzin").innerText = naposoIzin;
  document.getElementById("naposoSakit").innerText = naposoSakit;
  document.getElementById("naposoAlpha").innerText = naposoAlpha;

  document.getElementById("parguruHadir").innerText = parguruHadir;
  document.getElementById("parguruIzin").innerText = parguruIzin;
  document.getElementById("parguruSakit").innerText = parguruSakit;
  document.getElementById("parguruAlpha").innerText = parguruAlpha;
});

// DOWNLOAD DENGAN FILTER
function downloadTXT(){
  const tanggalFilter = document.getElementById("filterTanggal").value;
  const kegiatanFilter = document.getElementById("filterKegiatan").value;

  db.collection("absensi")
  .orderBy("createdAt","desc")
  .get()
  .then(snapshot=>{
    let textData = "REKAP ABSENSI KEGIATAN\n";
    textData += "================================\n\n";
    
    let ditemukan=false;
    let naposoHadir=0, naposoIzin=0, naposoSakit=0, naposoAlpha=0;
    let parguruHadir=0, parguruIzin=0, parguruSakit=0, parguruAlpha=0;

    snapshot.forEach(doc=>{
      const data = doc.data();

      if(tanggalFilter && data.tanggal !== tanggalFilter) return;
      if(kegiatanFilter && data.kegiatan !== kegiatanFilter) return;

      ditemukan=true;
      
      // Hitung rekap untuk file
      const kategori = data.kategori || "";
      if(kategori === "Naposobulung"){
        if(data.status==="Hadir") naposoHadir++;
        if(data.status==="Izin") naposoIzin++;
        if(data.status==="Sakit") naposoSakit++;
        if(data.status==="Alpha") naposoAlpha++;
      } else if(kategori === "Parguru Malua"){
        if(data.status==="Hadir") parguruHadir++;
        if(data.status==="Izin") parguruIzin++;
        if(data.status==="Sakit") parguruSakit++;
        if(data.status==="Alpha") parguruAlpha++;
      }

      textData += 
        "Kegiatan : " + (data.kegiatan || '') + "\n" +
        "Nama     : " + (data.nama || '') + "\n" +
        "Kategori : " + (data.kategori || '') + "\n" +
        "Hari     : " + (data.hari || '') + "\n" +
        "Tanggal  : " + (data.tanggal || '') + "\n" +
        "Status   : " + (data.status || '') + "\n" +
        "-----------------------------\n";
    });

    if(!ditemukan){
      alert("Data tidak ditemukan sesuai filter!");
      return;
    }

    // Tambahkan rekap di akhir file
    textData += "\n\nREKAP TOTAL ABSENSI\n";
    textData += "==================\n\n";
    
    textData += "NAPOSOBULUNG:\n";
    textData += "Hadir : " + naposoHadir + "\n";
    textData += "Izin  : " + naposoIzin + "\n";
    textData += "Sakit : " + naposoSakit + "\n";
    textData += "Alpha : " + naposoAlpha + "\n\n";
    
    textData += "PARGURU MALUA:\n";
    textData += "Hadir : " + parguruHadir + "\n";
    textData += "Izin  : " + parguruIzin + "\n";
    textData += "Sakit : " + parguruSakit + "\n";
    textData += "Alpha : " + parguruAlpha + "\n";

    const blob = new Blob([textData], {type:"text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    
    // Buat nama file dengan filter
    let fileName = "rekap_absensi";
    if(tanggalFilter) fileName += "_" + tanggalFilter;
    if(kegiatanFilter) fileName += "_" + kegiatanFilter;
    fileName += ".txt";
    
    link.download = fileName;
    link.click();
  });
}
</script>

</body>
</html>
