<!DOCTYPE html>
<html>
<head>
  <title>Absensi Kegiatan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Absensi Partangiangan & Latihan Koor</span>
    <a href="dashboard.html" class="btn btn-light">Kembali</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- FORM INPUT -->
  <div class="card p-3 mb-4 shadow">
    <h5>Input Absensi Kegiatan</h5>

    <select id="kegiatan" class="form-control mb-2">
      <option value="Partangiangan">Partangiangan</option>
      <option value="Latihan Koor">Latihan Koor</option>
      <option value="Lainnya">Lainnya</option>
    </select>

    <select id="anggotaSelect" class="form-control mb-2"></select>

    <input type="date" id="tanggal" class="form-control mb-2" onchange="isiHari()">

    <input type="text" id="hari" class="form-control mb-2" placeholder="Hari" readonly>

    <select id="status" class="form-control mb-2">
      <option value="Hadir">Hadir</option>
      <option value="Izin">Izin</option>
      <option value="Sakit">Sakit</option>
      <option value="Alpha">Alpha</option>
    </select>

    <button onclick="simpanAbsensi()" class="btn btn-primary">Simpan</button>
  </div>

  <!-- TABEL -->
  <div class="card p-3 shadow">
    <h5>Riwayat Absensi</h5>
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Kegiatan</th>
          <th>Nama</th>
          <th>Kategori</th>
          <th>Hari</th>
          <th>Tanggal</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="dataAbsensi"></tbody>
    </table>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCwQGsFPBIs_gk0Xc1hscpG-7n6M16gqWc",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan",
  storageBucket: "rnhkbp-pelikan.firebasestorage.app",
  messagingSenderId: "202813062166",
  appId: "1:202813062166:web:eb3d963d5965a5e6f48937"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
  }
});

// LOAD ANGGOTA
db.collection("anggota").onSnapshot(snapshot=>{
  let options="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    options += `<option value="${doc.id}|${data.nama}|${data.kategori}">
      ${data.nama} (${data.kategori})
    </option>`;
  });
  document.getElementById("anggotaSelect").innerHTML = options;
});

// ISI HARI OTOMATIS
function isiHari(){
  const tanggal = document.getElementById("tanggal").value;
  if(!tanggal) return;

  const hariList = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const date = new Date(tanggal);
  const hari = hariList[date.getDay()];

  document.getElementById("hari").value = hari;
}

// SIMPAN ABSENSI
function simpanAbsensi(){
  const kegiatan = document.getElementById("kegiatan").value;
  const anggotaData = document.getElementById("anggotaSelect").value.split("|");

  const anggotaId = anggotaData[0];
  const nama = anggotaData[1];
  const kategori = anggotaData[2];

  const tanggal = document.getElementById("tanggal").value;
  const hari = document.getElementById("hari").value;
  const status = document.getElementById("status").value;

  if(!tanggal){
    alert("Pilih tanggal dulu!");
    return;
  }

  db.collection("absensi").add({
    kegiatan,
    anggotaId,
    nama,
    kategori,
    tanggal,
    hari,
    status,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>{
    alert("Absensi berhasil disimpan");
    document.getElementById("tanggal").value="";
    document.getElementById("hari").value="";
  }).catch(e=>{
    alert("Error: " + e.message);
  });
}

// TAMPILKAN DATA REALTIME
db.collection("absensi")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{
  let html="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    html += `
      <tr>
        <td>${data.kegiatan}</td>
        <td>${data.nama}</td>
        <td>${data.kategori}</td>
        <td>${data.hari}</td>
        <td>${data.tanggal}</td>
        <td>${data.status}</td>
      </tr>
    `;
  });
  document.getElementById("dataAbsensi").innerHTML = html;
});
</script>

</body>
</html>
