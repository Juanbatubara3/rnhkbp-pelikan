<!DOCTYPE html>
<html>
<head>
  <title>Absensi Kegiatan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Absensi Partangiangan & Latihan Koor</span>
    <a href="dashboard.html" class="btn btn-light">Kembali</a>
  </div>
</nav>

<div class="container mt-4">

  <!-- FORM -->
  <div class="card p-3 mb-4 shadow">
    <h5>Input Absensi</h5>

    <input type="hidden" id="editId">

    <select id="kegiatan" class="form-control mb-2">
      <option value="Partangiangan">Partangiangan</option>
      <option value="Latihan Koor">Latihan Koor</option>
      <option value="Lainnya">Lainnya</option>
    </select>

    <select id="anggotaSelect" class="form-control mb-2"></select>

    <input type="date" id="tanggal" class="form-control mb-2" onchange="isiHari()">
    <input type="text" id="hari" class="form-control mb-2" placeholder="Hari" readonly>

    <select id="status" class="form-control mb-2">
      <option value="Hadir">Hadir</option>
      <option value="Izin">Izin</option>
      <option value="Sakit">Sakit</option>
      <option value="Alpha">Alpha</option>
    </select>

    <button onclick="simpanAbsensi()" class="btn btn-primary">Simpan</button>
  </div>

  <!-- TOTAL -->
  <div class="row mb-3">
    <div class="col-md-6">
      <div class="card p-3 bg-light">
        <h6>Naposo</h6>
        <div>Hadir: <span id="naposoHadir">0</span></div>
        <div>Absen: <span id="naposoAbsen">0</span></div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card p-3 bg-light">
        <h6>Parguru</h6>
        <div>Hadir: <span id="parguruHadir">0</span></div>
        <div>Absen: <span id="parguruAbsen">0</span></div>
      </div>
    </div>
  </div>

  <!-- TABEL -->
  <div class="card p-3 shadow">
    <h5>Riwayat Absensi</h5>
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Kegiatan</th>
          <th>Nama</th>
          <th>Kategori</th>
          <th>Hari</th>
          <th>Tanggal</th>
          <th>Status</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="dataAbsensi"></tbody>
    </table>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
  }
});

// LOAD ANGGOTA
db.collection("anggota").onSnapshot(snapshot=>{
  let options="";
  snapshot.forEach(doc=>{
    const data = doc.data();
    options += `<option value="${doc.id}|${data.nama}|${data.kategori}">
      ${data.nama} (${data.kategori})
    </option>`;
  });
  document.getElementById("anggotaSelect").innerHTML = options;
});

// HARI OTOMATIS
function isiHari(){
  const tanggal = document.getElementById("tanggal").value;
  if(!tanggal) return;

  const hariList = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
  const date = new Date(tanggal);
  document.getElementById("hari").value = hariList[date.getDay()];
}

// SIMPAN / UPDATE
function simpanAbsensi(){
  const editId = document.getElementById("editId").value;
  const kegiatan = document.getElementById("kegiatan").value;
  const anggotaData = document.getElementById("anggotaSelect").value.split("|");

  const data = {
    kegiatan,
    anggotaId: anggotaData[0],
    nama: anggotaData[1],
    kategori: anggotaData[2],
    tanggal: document.getElementById("tanggal").value,
    hari: document.getElementById("hari").value,
    status: document.getElementById("status").value,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  if(editId){
    db.collection("absensi").doc(editId).update(data).then(()=>{
      alert("Data berhasil diupdate");
      document.getElementById("editId").value="";
    });
  } else {
    db.collection("absensi").add(data).then(()=>{
      alert("Data berhasil disimpan");
    });
  }

  document.getElementById("tanggal").value="";
  document.getElementById("hari").value="";
}

// EDIT
function editData(id, kegiatan, nama, kategori, tanggal, status){
  document.getElementById("editId").value = id;
  document.getElementById("kegiatan").value = kegiatan;
  document.getElementById("tanggal").value = tanggal;
  document.getElementById("status").value = status;
  isiHari();
}

// HAPUS
function hapusData(id){
  if(confirm("Yakin mau hapus?")){
    db.collection("absensi").doc(id).delete();
  }
}

// TAMPILKAN DATA + HITUNG TOTAL
db.collection("absensi").orderBy("createdAt","desc")
.onSnapshot(snapshot=>{
  let html="";
  let naposoH=0, naposoA=0, parguruH=0, parguruA=0;

  snapshot.forEach(doc=>{
    const d = doc.data();

    if(d.kategori === "Naposo"){
      if(d.status === "Hadir") naposoH++;
      else naposoA++;
    }

    if(d.kategori === "Parguru"){
      if(d.status === "Hadir") parguruH++;
      else parguruA++;
    }

    html += `
      <tr>
        <td>${d.kegiatan}</td>
        <td>${d.nama}</td>
        <td>${d.kategori}</td>
        <td>${d.hari}</td>
        <td>${d.tanggal}</td>
        <td>${d.status}</td>
        <td>
          <button class="btn btn-warning btn-sm"
            onclick="editData('${doc.id}','${d.kegiatan}','${d.nama}','${d.kategori}','${d.tanggal}','${d.status}')">
            Edit
          </button>
          <button class="btn btn-danger btn-sm"
            onclick="hapusData('${doc.id}')">
            Hapus
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("dataAbsensi").innerHTML = html;
  document.getElementById("naposoHadir").innerText = naposoH;
  document.getElementById("naposoAbsen").innerText = naposoA;
  document.getElementById("parguruHadir").innerText = parguruH;
  document.getElementById("parguruAbsen").innerText = parguruA;
});
</script>

</body>
</html>
