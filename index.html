<!DOCTYPE html>
<html>
<head>
  <title>Login RNHKBP-Pelikan</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3>Admin Login</h3>

    <input id="email" class="form-control mb-2" placeholder="Email">
    <input id="password" type="password" class="form-control mb-2" placeholder="Password">
    <button onclick="login()" class="btn btn-primary w-100">Login</button>

  </div>
</div>

<!-- Firebase CDN (VERSI AMAN) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCwQGsFPBIs_gk0Xc1hscpG-7n6M16gqWc",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan",
  storageBucket: "rnhkbp-pelikan.firebasestorage.app",
  messagingSenderId: "202813062166",
  appId: "1:202813062166:web:eb3d963d5965a5e6f48937"
};

firebase.initializeApp(firebaseConfig);

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
  .then(() => {
    window.location.href = "dashboard.html";
  })
  .catch((error) => {
    alert(error.message);
  });
}
</script>

</body>
</html>
