<script>
// ================= KONFIGURASI FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyCwQGsFPBIs_gk0Xc1hscpG-7n6M16gqWc",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan",
  storageBucket: "rnhkbp-pelikan.firebasestorage.app",
  messagingSenderId: "202813062166",
  appId: "1:202813062166:web:eb3d963d5965a5e6f48937"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ================= CEK LOGIN =================
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById('adminEmail').innerHTML = `<i class="fas fa-user-circle me-1"></i>${user.email}`;
    loadRenungan();
  }
});

// ================= LOGOUT =================
function logout() {
  auth.signOut()
    .then(() => {
      window.location.href = "login.html";
    })
    .catch(error => {
      showAlert('Gagal logout: ' + error.message, 'danger');
    });
}

// ================= SHOW ALERT =================
function showAlert(message, type = 'success') {
  const alertEl = document.getElementById('alertMessage');
  alertEl.className = `alert alert-${type}`;
  alertEl.style.display = 'block';
  alertEl.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} me-2"></i>${message}`;
  
  setTimeout(() => {
    alertEl.style.display = 'none';
  }, 3000);
}

// ================= SHOW LOADING =================
function showLoading(show) {
  document.getElementById('loadingSpinner').style.display = show ? 'flex' : 'none';
}

// ================= SIMPAN RENUNGAN =================
async function simpanRenungan() {
  const id = document.getElementById('renunganId').value;
  const tanggal = document.getElementById('tanggal').value;
  const kategori = document.getElementById('kategori').value;
  const ayat = document.getElementById('ayat').value;
  const isi = document.getElementById('isi').value;
  const aplikasi = document.getElementById('aplikasi').value;
  
  if (!tanggal || !ayat || !isi) {
    showAlert('Tanggal, ayat, dan isi renungan harus diisi!', 'danger');
    return;
  }
  
  showLoading(true);
  
  try {
    const renunganData = {
      tanggal: tanggal,
      kategori: kategori,
      ayat: ayat,
      isi: isi,
      aplikasi: aplikasi || '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    
    if (id) {
      // Update
      await db.collection("renungan").doc(id).update(renunganData);
      showAlert('Renungan berhasil diperbarui!', 'success');
    } else {
      // Tambah baru
      await db.collection("renungan").add(renunganData);
      showAlert('Renungan berhasil ditambahkan!', 'success');
    }
    
    // Reset form
    batalEdit();
    loadRenungan();
    
  } catch (error) {
    console.error("Error saving:", error);
    showAlert('Gagal menyimpan: ' + error.message, 'danger');
  }
  
  showLoading(false);
}

// ================= LOAD RENUNGAN =================
async function loadRenungan() {
  try {
    const snapshot = await db.collection("renungan")
      .orderBy("tanggal", "desc")
      .get();
    
    let html = '';
    
    if (snapshot.empty) {
      html = `
        <tr>
          <td colspan="5" class="text-center py-4">
            <i class="fas fa-folder-open fa-3x text-muted mb-3"></i>
            <p class="text-muted">Belum ada renungan</p>
          </td>
        </tr>
      `;
    } else {
      snapshot.forEach(doc => {
        const data = doc.data();
        
        // Format tanggal
        let tanggalFormatted = data.tanggal;
        if (data.tanggal) {
          const parts = data.tanggal.split('-');
          if (parts.length === 3) {
            const bulan = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
            tanggalFormatted = `${parseInt(parts[2])} ${bulan[parseInt(parts[1])-1]} ${parts[0]}`;
          }
        }
        
        // Potong isi
        let isiSingkat = data.isi || '';
        if (isiSingkat.length > 100) {
          isiSingkat = isiSingkat.substring(0, 100) + '...';
        }
        
        html += `
          <tr>
            <td>${tanggalFormatted}</td>
            <td><span class="badge-kategori">${data.kategori || 'Renungan'}</span></td>
            <td class="ayat-cell">${data.ayat || '-'}</td>
            <td class="isi-cell">${isiSingkat}</td>
            <td class="action-cell">
              <button class="btn btn-warning btn-sm" onclick="editRenungan('${doc.id}')">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-danger btn-sm" onclick="hapusRenungan('${doc.id}')">
                <i class="fas fa-trash"></i>
              </button>
            </td>
          </tr>
        `;
      });
    }
    
    document.getElementById('daftarRenungan').innerHTML = html;
    
  } catch (error) {
    console.error("Error loading:", error);
    document.getElementById('daftarRenungan').innerHTML = `
      <tr>
        <td colspan="5" class="text-center py-4 text-danger">
          <i class="fas fa-exclamation-triangle fa-3x mb-3"></i>
          <p>Gagal memuat data: ${error.message}</p>
        </td>
      </tr>
    `;
  }
}

// ================= EDIT RENUNGAN =================
async function editRenungan(id) {
  showLoading(true);
  
  try {
    const doc = await db.collection("renungan").doc(id).get();
    if (!doc.exists) {
      showAlert('Renungan tidak ditemukan!', 'danger');
      return;
    }
    
    const data = doc.data();
    
    document.getElementById('renunganId').value = id;
    document.getElementById('tanggal').value = data.tanggal || '';
    document.getElementById('kategori').value = data.kategori || 'Renungan Pagi';
    document.getElementById('ayat').value = data.ayat || '';
    document.getElementById('isi').value = data.isi || '';
    document.getElementById('aplikasi').value = data.aplikasi || '';
    
    document.getElementById('btnBatal').style.display = 'inline-block';
    document.getElementById('btnSimpan').innerHTML = '<i class="fas fa-save me-2"></i>Perbarui Renungan';
    
    // Scroll ke form
    window.scrollTo({ top: 0, behavior: 'smooth' });
    
  } catch (error) {
    console.error("Error editing:", error);
    showAlert('Gagal memuat data: ' + error.message, 'danger');
  }
  
  showLoading(false);
}

// ================= HAPUS RENUNGAN =================
function hapusRenungan(id) {
  if (confirm('Apakah Anda yakin ingin menghapus renungan ini?')) {
    showLoading(true);
    
    db.collection("renungan").doc(id).delete()
      .then(() => {
        showAlert('Renungan berhasil dihapus!', 'success');
        loadRenungan();
      })
      .catch(error => {
        console.error("Error deleting:", error);
        showAlert('Gagal menghapus: ' + error.message, 'danger');
      })
      .finally(() => {
        showLoading(false);
      });
  }
}

// ================= BATAL EDIT =================
function batalEdit() {
  document.getElementById('renunganId').value = '';
  document.getElementById('tanggal').value = new Date().toISOString().split('T')[0];
  document.getElementById('kategori').value = 'Renungan Pagi';
  document.getElementById('ayat').value = '';
  document.getElementById('isi').value = '';
  document.getElementById('aplikasi').value = '';
  
  document.getElementById('btnBatal').style.display = 'none';
  document.getElementById('btnSimpan').innerHTML = '<i class="fas fa-save me-2"></i>Simpan Renungan';
}

// ================= SET TANGGAL DEFAULT =================
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('tanggal').value = today;
});
</script>
