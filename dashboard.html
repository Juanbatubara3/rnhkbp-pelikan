<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <span class="navbar-brand">Dashboard RNHKBP-Pelikan</span>
    <button onclick="logout()" class="btn btn-danger">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <div class="row mb-4">
    <div class="col-md-4">
      <div class="card text-center p-3">
        <h5>Total Naposobulung</h5>
        <h3 id="totalNapo">0</h3>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card text-center p-3">
        <h5>Total Parguru Malua</h5>
        <h3 id="totalGuru">0</h3>
      </div>
    </div>
  </div>

  <canvas id="myChart"></canvas>

  <div class="mt-4">
    <a href="anggota.html" class="btn btn-primary">Kelola Anggota</a>
    <a href="absensi.html" class="btn btn-success">Kelola Absensi</a>
    <a href="dokumentasi.html" class="btn btn-warning">Upload Dokumentasi</a>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCwQGsFPBIs_gk0Xc1hscpG-7n6M16gqWc",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan",
  storageBucket: "rnhkbp-pelikan.firebasestorage.app",
  messagingSenderId: "202813062166",
  appId: "1:202813062166:web:eb3d963d5965a5e6f48937"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

firebase.auth().onAuthStateChanged(user => {
  if(!user){
    window.location.href = "index.html";
  }
});

function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href="index.html";
  });
}

// Ambil data anggota
db.collection("anggota").onSnapshot(snapshot => {

  let napo = 0;
  let guru = 0;

  snapshot.forEach(doc=>{
    if(doc.data().kategori === "Naposobulung"){
      napo++;
    } else {
      guru++;
    }
  });

  document.getElementById("totalNapo").innerText = napo;
  document.getElementById("totalGuru").innerText = guru;

  const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Naposobulung', 'Parguru Malua'],
      datasets: [{
        label: 'Jumlah Anggota',
        data: [napo, guru]
      }]
    }
  });

});
</script>

</body>
</html>
