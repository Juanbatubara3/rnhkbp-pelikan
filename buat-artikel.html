<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RNHKBP Pelikan">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Buat Artikel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
  <h3>Buat Artikel Dokumentasi</h3>

  <div class="card p-4">
    <input type="text" id="judul" class="form-control mb-2" placeholder="Judul Artikel">

    <div id="editor" style="height:200px;" class="mb-2"></div>

    <input type="file" id="file" class="form-control mb-2">

    <button onclick="upload()" class="btn btn-primary">Publish</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCwQGsFPBIs_gk0Xc1hscpG-7n6M16gqWc",
  authDomain: "rnhkbp-pelikan.firebaseapp.com",
  projectId: "rnhkbp-pelikan"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

var quill = new Quill('#editor', { theme: 'snow' });

const cloudName = "dnyrxwl1g";
const uploadPreset = "rnhkbp-pelikan";

function upload(){
  const judul = document.getElementById("judul").value;
  const isi = quill.root.innerHTML;
  const file = document.getElementById("file").files[0];

  if(!judul || !isi || !file){
    alert("Lengkapi semua data!");
    return;
  }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
    method: "POST",
    body: formData
  })
  .then(res => res.json())
  .then(data => {
    db.collection("artikel").add({
      judul: judul,
      isi: isi,
      foto: data.secure_url,
      tanggal: new Date(),
      like: 0
    });

    alert("Artikel berhasil dipublish!");
    window.location.href="blog.html";
  });
}
</script>

<script src="js/pwa-init.js"></script>
</body>
</html>
